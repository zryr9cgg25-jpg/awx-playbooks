---
- name: Windows info test
  hosts: windows
  gather_facts: false

  tasks:
    - name: Get hostname
      ansible.windows.win_command: hostname
      register: hostname_result
      changed_when: false

    - name: Show hostname
      ansible.builtin.debug:
        var: hostname_result.stdout

    - name: Get Windows version
      ansible.windows.win_shell: |
        Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, CsName | ConvertTo-Json
      register: windows_info
      changed_when: false

    - name: Show Windows version
      ansible.builtin.debug:
        var: windows_info.stdout
